<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="'JetBrains Mono','SF Mono',ui-monospace,monospace" width="1200" height="720" role="img" aria-label="KoʻzNur tizim arxitekturasi: React konsoli, FastAPI, SE-ResNeXt50 5-fold ansambl, Grad-CAM">
  <defs>
    <!-- engineering grid -->
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M24 0H0V24" fill="none" stroke="#D9E6EA" stroke-width="1"/>
    </pattern>
    <pattern id="gridDark" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M24 0H0V24" fill="none" stroke="#22323D" stroke-width="1"/>
    </pattern>
    <!-- grade ramp -->
    <linearGradient id="ramp" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1F9D74"/>
      <stop offset="25%" stop-color="#7FB23A"/>
      <stop offset="50%" stop-color="#E0A82E"/>
      <stop offset="75%" stop-color="#DB7C26"/>
      <stop offset="100%" stop-color="#C0392B"/>
    </linearGradient>
    <marker id="arrow" markerWidth="11" markerHeight="11" refX="8" refY="5" orient="auto">
      <path d="M1 1 L9 5 L1 9" fill="none" stroke="#0F838C" stroke-width="1.6"/>
    </marker>
    <marker id="arrowBack" markerWidth="11" markerHeight="11" refX="3" refY="5" orient="auto">
      <path d="M9 1 L1 5 L9 9" fill="none" stroke="#5A6B7B" stroke-width="1.4"/>
    </marker>
  </defs>

  <!-- canvas -->
  <rect width="1200" height="720" fill="#F6F8F9"/>
  <rect width="1200" height="720" fill="url(#grid)"/>

  <!-- title bar -->
  <text x="48" y="50" fill="#5A6B7B" font-size="12" letter-spacing="3">KOʻZNUR · TIZIM ARXITEKTURASI</text>
  <text x="48" y="84" fill="#0E1A24" font-family="'Space Grotesk','Inter',sans-serif" font-size="30" font-weight="700">Fundus rasm → ICDR daraja · referable · Grad-CAM</text>
  <line x1="48" y1="104" x2="1152" y2="104" stroke="#D9E6EA" stroke-width="1"/>

  <!-- reticle corner ticks (top-right) -->
  <g stroke="#0FB5BA" stroke-width="2" fill="none">
    <path d="M1152 28 h-22 M1152 28 v22"/>
  </g>

  <!-- ============ STAGE 1: React console ============ -->
  <g>
    <rect x="48" y="150" width="270" height="420" rx="10" fill="#16242E"/>
    <rect x="48" y="150" width="270" height="420" rx="10" fill="url(#gridDark)"/>
    <rect x="48" y="150" width="270" height="420" rx="10" fill="none" stroke="#0F838C" stroke-width="1.5"/>
    <!-- corner ticks -->
    <g stroke="#0FB5BA" stroke-width="2" fill="none">
      <path d="M62 164 h16 M62 164 v16"/>
      <path d="M304 556 h-16 M304 556 v-16"/>
    </g>
    <text x="74" y="190" fill="#0FB5BA" font-size="11" letter-spacing="2.5">01 · CLIENT</text>
    <text x="74" y="224" fill="#FFFFFF" font-family="'Space Grotesk',sans-serif" font-size="20" font-weight="700">React konsoli</text>
    <text x="74" y="248" fill="#7E93A1" font-size="11.5" letter-spacing="1">Vite + Tailwind</text>

    <!-- mini upload dropzone -->
    <rect x="74" y="270" width="218" height="120" rx="8" fill="#0E1A24" stroke="#2C3E49" stroke-width="1"/>
    <g stroke="#0FB5BA" stroke-width="1.5" fill="none">
      <path d="M86 282 h12 M86 282 v12"/>
      <path d="M280 378 h-12 M280 378 v-12"/>
    </g>
    <circle cx="183" cy="318" r="16" fill="none" stroke="#0FB5BA" stroke-width="1.5"/>
    <path d="M183 312 v12 M177 318 l6 -6 l6 6" stroke="#0FB5BA" stroke-width="1.5" fill="none"/>
    <text x="183" y="362" fill="#9FB1BD" font-size="11" text-anchor="middle">Fundus rasm · drag</text>

    <text x="74" y="420" fill="#7E93A1" font-size="10.5" letter-spacing="1.5">NATIJA KARTASI</text>
    <rect x="74" y="430" width="60" height="22" rx="4" fill="#C0392B"/>
    <text x="104" y="445" fill="#FFFFFF" font-size="11" text-anchor="middle">GRADE 4</text>
    <rect x="142" y="430" width="86" height="22" rx="4" fill="#E8833A"/>
    <text x="185" y="445" fill="#0E1A24" font-size="10.5" text-anchor="middle" font-weight="700">REFERABLE</text>
    <!-- confidence bar -->
    <rect x="74" y="466" width="218" height="8" rx="4" fill="#21323D"/>
    <rect x="74" y="466" width="150" height="8" rx="4" fill="#0FB5BA"/>
    <text x="74" y="494" fill="#7E93A1" font-size="10.5">confidence · Grad-CAM toggle</text>
    <!-- grade ramp legend -->
    <rect x="74" y="512" width="218" height="8" rx="4" fill="url(#ramp)"/>
    <text x="74" y="540" fill="#7E93A1" font-size="10.5">ICDR 0 · 1 · 2 · 3 · 4</text>
  </g>

  <!-- ARROW 1: HTTP request -->
  <line x1="318" y1="300" x2="392" y2="300" stroke="#0F838C" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="355" y="290" fill="#0F838C" font-size="10.5" text-anchor="middle" letter-spacing="1">HTTP</text>
  <text x="355" y="318" fill="#5A6B7B" font-size="9.5" text-anchor="middle">multipart</text>
  <!-- ARROW back: JSON response -->
  <line x1="392" y1="430" x2="318" y2="430" stroke="#5A6B7B" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#arrowBack)"/>
  <text x="355" y="422" fill="#5A6B7B" font-size="9.5" text-anchor="middle">JSON</text>

  <!-- ============ STAGE 2: FastAPI ============ -->
  <g>
    <rect x="394" y="150" width="300" height="420" rx="10" fill="#FFFFFF" stroke="#D9E6EA" stroke-width="1.5"/>
    <g stroke="#0FB5BA" stroke-width="2" fill="none">
      <path d="M408 164 h16 M408 164 v16"/>
      <path d="M680 556 h-16 M680 556 v-16"/>
    </g>
    <text x="420" y="190" fill="#0F838C" font-size="11" letter-spacing="2.5">02 · SERVICE</text>
    <text x="420" y="224" fill="#0E1A24" font-family="'Space Grotesk',sans-serif" font-size="20" font-weight="700">FastAPI</text>
    <text x="420" y="248" fill="#5A6B7B" font-size="11.5" letter-spacing="1">Python · uvicorn · MPS</text>

    <!-- endpoints -->
    <rect x="420" y="266" width="248" height="30" rx="5" fill="#F6F8F9" stroke="#D9E6EA"/>
    <text x="432" y="285" fill="#0F838C" font-size="11">POST</text>
    <text x="476" y="285" fill="#0E1A24" font-size="11">/predict</text>
    <rect x="420" y="302" width="248" height="26" rx="5" fill="#F6F8F9" stroke="#D9E6EA"/>
    <text x="432" y="319" fill="#5A6B7B" font-size="10.5">GET  /health · /samples</text>

    <!-- preprocessing pipeline -->
    <text x="420" y="358" fill="#5A6B7B" font-size="10" letter-spacing="2">PREPROCESSING</text>
    <g font-size="10.5" fill="#0E1A24">
      <rect x="420" y="368" width="248" height="26" rx="5" fill="#EEF4F5" stroke="#D9E6EA"/>
      <text x="432" y="385">Ben-Graham scale-radius crop · 288</text>
      <rect x="420" y="400" width="248" height="26" rx="5" fill="#EEF4F5" stroke="#D9E6EA"/>
      <text x="432" y="417">resize 256 → ImageNet normalize</text>
    </g>

    <!-- response shape -->
    <text x="420" y="454" fill="#5A6B7B" font-size="10" letter-spacing="2">/predict · JSON</text>
    <rect x="420" y="462" width="248" height="92" rx="6" fill="#0E1A24"/>
    <g font-size="10" fill="#9FB1BD">
      <text x="434" y="482"><tspan fill="#0FB5BA">grade</tspan>: 4,  <tspan fill="#0FB5BA">grade_label</tspan>: "Proliferative"</text>
      <text x="434" y="500"><tspan fill="#0FB5BA">referable</tspan>: <tspan fill="#E8833A">true</tspan>,  <tspan fill="#0FB5BA">confidence</tspan>: 0.91</text>
      <text x="434" y="518"><tspan fill="#0FB5BA">probabilities</tspan>: [0,0,0.04,0.21,0.74]</text>
      <text x="434" y="536"><tspan fill="#0FB5BA">gradcam_png_base64</tspan>, <tspan fill="#0FB5BA">recommendation</tspan></text>
    </g>
  </g>

  <!-- ARROW 2 -->
  <line x1="694" y1="380" x2="768" y2="380" stroke="#0F838C" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="731" y="370" fill="#0F838C" font-size="10.5" text-anchor="middle">tensor</text>

  <!-- ============ STAGE 3: Engine ============ -->
  <g>
    <rect x="770" y="150" width="382" height="420" rx="10" fill="#16242E"/>
    <rect x="770" y="150" width="382" height="420" rx="10" fill="url(#gridDark)"/>
    <rect x="770" y="150" width="382" height="420" rx="10" fill="none" stroke="#0F838C" stroke-width="1.5"/>
    <g stroke="#0FB5BA" stroke-width="2" fill="none">
      <path d="M784 164 h16 M784 164 v16"/>
      <path d="M1138 556 h-16 M1138 556 v-16"/>
    </g>
    <text x="796" y="190" fill="#0FB5BA" font-size="11" letter-spacing="2.5">03 · ENGINE · PyTorch</text>
    <text x="796" y="224" fill="#FFFFFF" font-family="'Space Grotesk',sans-serif" font-size="20" font-weight="700">SE-ResNeXt50</text>
    <text x="796" y="248" fill="#7E93A1" font-size="11.5" letter-spacing="1">regression head · 5-fold ensemble</text>

    <!-- 5 folds -->
    <text x="796" y="284" fill="#7E93A1" font-size="10" letter-spacing="2">5-FOLD CV</text>
    <g>
      <rect x="796" y="294" width="62" height="40" rx="5" fill="#0E1A24" stroke="#2C3E49"/>
      <text x="827" y="312" fill="#FFFFFF" font-size="10" text-anchor="middle">fold 1</text>
      <text x="827" y="326" fill="#0FB5BA" font-size="9.5" text-anchor="middle">reg</text>
      <rect x="864" y="294" width="62" height="40" rx="5" fill="#0E1A24" stroke="#2C3E49"/>
      <text x="895" y="312" fill="#FFFFFF" font-size="10" text-anchor="middle">fold 2</text>
      <text x="895" y="326" fill="#0FB5BA" font-size="9.5" text-anchor="middle">reg</text>
      <rect x="932" y="294" width="62" height="40" rx="5" fill="#0E1A24" stroke="#2C3E49"/>
      <text x="963" y="312" fill="#FFFFFF" font-size="10" text-anchor="middle">fold 3</text>
      <text x="963" y="326" fill="#0FB5BA" font-size="9.5" text-anchor="middle">reg</text>
      <rect x="1000" y="294" width="62" height="40" rx="5" fill="#0E1A24" stroke="#2C3E49"/>
      <text x="1031" y="312" fill="#FFFFFF" font-size="10" text-anchor="middle">fold 4</text>
      <text x="1031" y="326" fill="#0FB5BA" font-size="9.5" text-anchor="middle">reg</text>
      <rect x="1068" y="294" width="62" height="40" rx="5" fill="#0E1A24" stroke="#2C3E49"/>
      <text x="1099" y="312" fill="#FFFFFF" font-size="10" text-anchor="middle">fold 5</text>
      <text x="1099" y="326" fill="#0FB5BA" font-size="9.5" text-anchor="middle">reg</text>
    </g>

    <!-- mean -> threshold -->
    <text x="796" y="372" fill="#7E93A1" font-size="10" letter-spacing="2">MEAN(reg) → THRESHOLD ROUND</text>
    <rect x="796" y="382" width="334" height="30" rx="5" fill="#0E1A24" stroke="#2C3E49"/>
    <text x="810" y="401" fill="#9FB1BD" font-size="11">round at [0.5, 1.5, 2.5, 3.5]  →  ICDR 0–4</text>

    <!-- referable rule -->
    <rect x="796" y="420" width="160" height="30" rx="5" fill="none" stroke="#E8833A" stroke-width="1.4"/>
    <text x="876" y="439" fill="#E8833A" font-size="11" text-anchor="middle">referable = grade ≥ 2</text>

    <!-- grad-cam -->
    <text x="796" y="478" fill="#7E93A1" font-size="10" letter-spacing="2">EXPLAINABILITY</text>
    <rect x="796" y="488" width="190" height="66" rx="6" fill="#0E1A24" stroke="#2C3E49"/>
    <!-- mock heatmap -->
    <rect x="808" y="498" width="46" height="46" rx="4" fill="#16242E"/>
    <circle cx="831" cy="521" r="17" fill="#C0392B" opacity="0.5"/>
    <circle cx="838" cy="514" r="9" fill="#E0A82E" opacity="0.7"/>
    <text x="864" y="514" fill="#FFFFFF" font-size="11">Grad-CAM</text>
    <text x="864" y="530" fill="#7E93A1" font-size="9.5">last conv block</text>
    <text x="864" y="544" fill="#7E93A1" font-size="9.5">→ heatmap PNG</text>

    <!-- ICDR ramp on the right -->
    <rect x="1000" y="488" width="130" height="10" rx="5" fill="url(#ramp)"/>
    <text x="1000" y="516" fill="#7E93A1" font-size="9.5">No DR → Proliferative</text>
    <text x="1000" y="534" fill="#9FB1BD" font-size="9.5">QWK ≈ 0.92 · 5-fold CV</text>
  </g>

  <!-- footer band -->
  <line x1="48" y1="610" x2="1152" y2="610" stroke="#D9E6EA" stroke-width="1"/>
  <text x="48" y="640" fill="#5A6B7B" font-size="11" letter-spacing="2">DATA OQIMI</text>
  <text x="48" y="664" fill="#0E1A24" font-size="12.5">
    Fundus rasm  →  Ben-Graham crop 288  →  resize 256 · normalize  →  5-fold regression (mean)  →  threshold round  →  ICDR 0–4 + referable + Grad-CAM
  </text>
  <g font-family="'Space Grotesk',sans-serif">
    <rect x="48" y="682" width="220" height="26" rx="13" fill="none" stroke="#E8833A" stroke-width="1.3"/>
    <text x="158" y="699" fill="#0E1A24" font-size="11.5" text-anchor="middle" font-weight="600">TRIAGE · NOT DIAGNOSIS</text>
  </g>
  <text x="1152" y="700" fill="#5A6B7B" font-size="11" text-anchor="end" letter-spacing="1">TEAM ZENO · KOʻZNUR</text>
</svg>
